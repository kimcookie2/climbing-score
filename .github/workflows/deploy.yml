# master 브랜치에 push하면 VPS에 자동 배포한다.
# 필요한 저장소 Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (README 배포 섹션 참고)
name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch: # GitHub 웹에서 수동 실행 버튼

concurrency:
  group: deploy
  cancel-in-progress: false # 진행 중인 배포는 끝까지 완료

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd ~/climbing-score
            git pull --ff-only
            npm ci
            npm run build
            pm2 restart climbing
            pm2 save
